<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubThorn v.2.5.6 (Perfect Tag Restored)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); color: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .main-container { max-width: 650px; width: 100%; text-align: center; padding: 40px 20px; box-sizing: border-box; }
        .main-title { font-family: "Georgia", serif; font-size: 46px; margin: 0 0 5px 0; color: #38bdf8; text-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .main-version { font-size: 13px; color: #0ea5e9; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        .converter-card { background: #ffffff; color: #1e293b; border-radius: 20px; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: left; }
        .dropzone { border: 2px dashed #38bdf8; background: #f8fafc; border-radius: 14px; padding: 45px 20px; text-align: center; cursor: pointer; transition: all 0.25s ease; margin-bottom: 20px; }
        .dropzone:hover { border-color: #2563eb; background: #f0f9ff; }
        .form-label { font-size: 13px; color: #475569; font-weight: 700; margin-top: 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .select-input, .text-input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; background: #f1f5f9; box-sizing: border-box; outline: none; font-size: 14px; transition: all 0.2s; }
        .select-input:focus, .text-input:focus { border-color: #38bdf8; background: #ffffff; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        .progress-container { margin-top: 25px; display: none; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .file-name-info { font-size: 13px; color: #0284c7; font-weight: bold; margin-bottom: 10px; word-break: break-all; display: flex; align-items: center; gap: 4px; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 10px; height: 10px; overflow: hidden; margin-top: 8px; }
        .progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #2563eb); transition: width 0.15s ease; }
        .btn-translate { width: 100%; background: #e2e8f0; color: #94a3b8; border: none; padding: 16px; border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: not-allowed; transition: all 0.3s ease; }
        .btn-translate.active { background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%); color: #ffffff; cursor: pointer; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-translate.active:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
        .engine-note { font-size: 11px; color: #64748b; margin-top: 12px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="main-title">SubThorn Translation</h1>
        <div class="main-version">ABSOLUTE RESTORATION v.2.5.6</div>
        <div class="converter-card">
            <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 44px; margin-bottom: 12px;">🎬</div>
                <p style="font-weight: 700; color: #334155; margin: 5px 0; font-size: 15px;">ลากไฟล์ซับไตเติลมาวาง หรือคลิกเพื่อเลือกไฟล์</p>
                <p style="font-size: 12px; color: #64748b; margin: 5px 0 0 0;">รองรับไฟล์รูปแบบ SRT, ASS, SSA, VTT</p>
                <input type="file" id="fileInput" accept=".srt,.ass,.ssa,.vtt" style="display:none;">
            </div>

            <label class="form-label">🤖 เลือกเครื่องมือแปลภาษา (Translation Engine)</label>
            <select class="select-input" id="apiEngine">
                <option value="google_free" selected>Google Translate v.2 API / (Free)</option>
                <option value="openai">OpenAI API GPT-4o</option>
            </select>

            <label class="form-label">🔑 API Key (จำเป็นสำหรับโหมด OpenAI หรือ Google Cloud Paid)</label>
            <input type="password" class="text-input" id="apiKey" placeholder="กรอก API Key เพื่อปลดล็อคประสิทธิภาพการแปล">

            <label class="form-label">🎯 แปลงเป็นภาษา</label>
            <select class="select-input" id="targetLang">
                <option value="th" selected>Thai (ภาษาไทย)</option>
                <option value="en">English (ภาษาอังกฤษ)</option>
            </select>

            <div class="progress-container" id="progressContainer">
                <div class="file-name-info" id="fileNameDisplay"></div>
                <div style="display:flex; justify-content: space-between; font-size:12px; font-weight:700; color:#334155;">
                    <span id="statusText">เตรียมความพร้อม...</span>
                    <span id="percentageText">0%</span>
                </div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            </div>

            <button class="btn-translate" id="btnTranslate" disabled>เริ่มกระบวนการแปลซับไตเติล</button>
            <div class="engine-note">🚀 <b>v.2.5.6 Perfect Engine:</b> แก้ไขปัญหาวรรคเกินและคำงอกถาวรด้วย Bullet Masking ป้องกัน API อ่านรหัสตัวเลขผิดพลาด บาลานซ์ความเสถียรสูงสุด</div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const btnTranslate = document.getElementById('btnTranslate');
        const progressBarFill = document.getElementById('progressBarFill');
        const statusText = document.getElementById('statusText');
        const percentageText = document.getElementById('percentageText');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        let selectedFile = null;
        let fileExtension = 'srt';
        let rawFileContent = "";

        // พรีเซ็ตระบบล้างคำแปลเอ๋อหลังกระบวนการแปลเสร็จสิ้นตามมาตรฐานเดิม
        const terminologyDict = {
            preTranslate: [
                { regex: /^No\.$/i, replace: "SUB_FORCE_NEGATION_REPLACE" },
                { regex: /^No$/i, replace: "SUB_FORCE_NEGATION_REPLACE" }
            ],
            postTranslate: [
                { bad: /SUB_FORCE_NEGATION_REPLACE/g, good: "ไม่นะ" },
                { bad: /เลขที่\s*$/i, good: "ไม่นะ" },
                { bad: /^เลขที่$/i, good: "ไม่" },
                { bad: /\bเลขที่\b/g, good: "ไม่" },
                { bad: /หมายเลข\s*$/i, good: "ไม่นะ" },
                { bad: /^หมายเลข$/i, good: "ไม่" },
                { bad: /อันดับที่\s*$/i, good: "ไม่" }
            ]
        };

        fileInput.addEventListener('change', (e) => { 
            if (e.target.files.length > 0) { handleFileLoad(e.target.files[0]); }
        });

        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = '#2563eb'; });
        dropzone.addEventListener('dragleave', (e) => { e.preventDefault(); dropzone.style.borderColor = '#38bdf8'; });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = '#38bdf8';
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileLoad(e.dataTransfer.files[0]);
            }
        });

        function handleFileLoad(file) {
            selectedFile = file;
            fileExtension = selectedFile.name.split('.').pop().toLowerCase();
            
            const reader = new FileReader();
            reader.onload = function(e) {
                rawFileContent = e.target.result;
                fileNameDisplay.innerHTML = `📄 ไฟล์ที่เลือก: ${selectedFile.name}`;
                document.getElementById('progressContainer').style.display = 'block';
                btnTranslate.removeAttribute('disabled');
                btnTranslate.classList.add('active');
                statusText.textContent = "ตรวจสอบโครงสร้างไฟล์และเตรียม Masking Engine เรียบร้อยครับพี่";
            };
            reader.readAsText(selectedFile);
        }

        // ==========================================
        // 🛡️ ระบบ TAG PROTECTION ENGINE v.2.5.6 (ป้องกันคำงอก)
        // ==========================================
        function protectTagsAndFix(textArray) {
            return textArray.map((txt) => {
                let text = txt.trim();
                if (!text) return { text: "", tags: [] };

                // ดักจับคำเฉพาะล่วงหน้าตามมาตรฐาน
                terminologyDict.preTranslate.forEach(rule => {
                    text = text.replace(rule.regex, rule.replace);
                });

                // ดึงและซ่อนโค้ด Tag ทุกชนิด (<i>, <b>, {\an8})
                let currentTags = [];
                let tagRegex = /(<\/?[a-zA-Z]+[^>]*>|\{[^}]+\})/g;
                let match;
                
                while ((match = tagRegex.exec(text)) !== null) {
                    currentTags.push(match[0]);
                }
                
                // ใช้ "•" เป็นตัวคั่นแทนการใช้คำว่า __TAG_X__ เพื่อแก้ปัญหา AI ชอบแปลคำว่างอกออกมาข้างหน้าประโยค
                text = text.replace(tagRegex, "•");

                return { text: text, tags: currentTags };
            });
        }

        function restoreTagsAndClean(translatedArray, metaTagPairs) {
            return translatedArray.map((txt, index) => {
                let text = txt;
                let tags = metaTagPairs[index].tags;

                // นำ Tag กลับมาเสียบแทนที่เครื่องหมาย "•" ทีละตัวตามลำดับดั้งเดิม
                tags.forEach((tag) => {
                    text = text.replace(/•/, tag);
                });

                // ทำความสะอาดเคลียร์คำแปลเอ๋อหลังกระบวนการประกอบร่าง
                terminologyDict.postTranslate.forEach(rule => {
                    text = text.replace(rule.bad, rule.good);
                });

                // ดักล้างช่องว่างส่วนเกินที่ชอบเกิดรอบๆ Tag เพื่อให้ซับเรียงชิดติดกันสวยงาม
                text = text.replace(/\s*(<\/?[a-zA-Z]+[^>]*>|\{[^}]+\})\s*/g, '$1');
                
                return text.replace(/\s+/g, ' ').trim();
            });
        }

        async function translateWithGoogle(textArray, targetLang, apiKey) {
            let metaPairs = protectTagsAndFix(textArray);
            let preparedTexts = metaPairs.map(p => p.text);
            let rawTranslations = [];
            
            if (apiKey) {
                let params = new URLSearchParams({ key: apiKey, target: targetLang, format: 'text' });
                preparedTexts.forEach(t => params.append('q', t || ' '));
                const res = await fetch(`https://translation.googleapis.com/language/translate/v2?${params.toString()}`, { method: 'POST' });
                const data = await res.json();
                rawTranslations = data.data.translations.map(t => t.translatedText);
            } else {
                const promises = preparedTexts.map(async (t) => {
                    if (!t) return "";
                    let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(t)}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    return (data && data[0]) ? data[0].map(x => x[0]).join('') : t;
                });
                rawTranslations = await Promise.all(promises);
            }
            return restoreTagsAndClean(rawTranslations, metaPairs);
        }

        async function translateWithOpenAI(textArray, targetLang, apiKey) {
            let metaPairs = protectTagsAndFix(textArray);
            let preparedTexts = metaPairs.map(p => p.text);
            let chunkText = preparedTexts.map((txt, index) => `[L_${index}] ${txt}`).join('\n');
            
            const systemPrompt = `You are a professional cinema/series subtitle translator converting English to Thai.
Your ultimate objective is to output perfectly natural dialogues. You must use appropriate Thai gender pronouns (ผม/ฉัน/เธอ/เขา) and polite ending particles (ครับ/ค่ะ/คะ/นะครับ) depending on the scene dynamics.

CRITICAL ASSIGNMENT: Never translate the exclamation "No" or "No." into "เลขที่" or "หมายเลข". These are negations, translate them into contextually appropriate Thai words such as "ไม่", "ไม่นะ", "ไม่มี", "ไม่จริง", "ไม่ใช่".

Formatting Directives:
1. Translate line-by-line following the exact tag prefixes like [L_0], [L_1]. Do not omit, combine, or invent rows.
2. Keep text placeholders like "•" completely intact inside the sentences. Do not translate or change them.
3. Return only the rows matching the [L_x] structure.`;

            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-4o',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: chunkText }
                    ],
                    temperature: 0.2
                })
            });

            const data = await res.json();
            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                let resultList = new Array(textArray.length).fill("");
                
                const lines = reply.split('\n');
                lines.forEach(line => {
                    let match = line.match(/^\[L_(\d+)\]\s*(.*)/);
                    if (match) {
                        let idx = parseInt(match[1]);
                        if (idx < resultList.length) {
                            resultList[idx] = match[2].trim();
                        }
                    }
                });

                for(let k=0; k<resultList.length; k++) {
                    if(!resultList[k] && textArray[k]) {
                        resultList[k] = "ไม่"; 
                    }
                }
                return restoreTagsAndClean(resultList, metaPairs);
            }
            throw new Error("OpenAI Engine Core Fault");
        }

        btnTranslate.addEventListener('click', async () => {
            const engine = document.getElementById('apiEngine').value;
            const key = document.getElementById('apiKey').value.trim();
            const targetLang = document.getElementById('targetLang').value;
            
            if (engine === 'openai' && !key) {
                alert("กรุณาใส่ OpenAI API Key ก่อนเริ่มทำงานครับพี่");
                return;
            }

            btnTranslate.setAttribute('disabled', 'true');
            btnTranslate.classList.remove('active');

            const lines = (fileExtension === 'srt' || fileExtension === 'vtt') 
                ? rawFileContent.split(/\r?\n\r?\n/) 
                : rawFileContent.split(/\r?\n/);
                
            let finalBlocks = [];
            let chunkSize = engine === 'openai' ? 12 : 25; 
            
            for (let i = 0; i < lines.length; i += chunkSize) {
                let batch = lines.slice(i, i + chunkSize);
                let textArray = [], meta = [];
                
                batch.forEach(b => {
                    let trimmed = b.trim();
                    if(!trimmed) {
                        meta.push({ type: 'empty' });
                    } else if((fileExtension === 'srt' || fileExtension === 'vtt')) {
                        let l = trimmed.split(/\r?\n/);
                        if (l.length >= 3) {
                            meta.push({ type: 'sub', header: l[0], time: l[1] });
                            textArray.push(l.slice(2).join(' '));
                        } else {
                            meta.push({ type: 'raw', content: b });
                        }
                    } else if(fileExtension === 'ass' || fileExtension === 'ssa') {
                        if (trimmed.startsWith('Dialogue:')) {
                            let parts = trimmed.split(',');
                            meta.push({ type: 'ass_dialogue', prefix: parts.slice(0, 9).join(',') });
                            textArray.push(parts.slice(9).join(','));
                        } else {
                            meta.push({ type: 'raw', content: b });
                        }
                    } else {
                        meta.push({ type: 'raw', content: b });
                    }
                });
                
                let translated = [];
                try {
                    if (engine === 'openai') {
                        translated = await translateWithOpenAI(textArray, targetLang, key);
                    } else {
                        translated = await translateWithGoogle(textArray, targetLang, key);
                    }
                } catch (err) {
                    console.error("Critical Intercept - Fallback Triggered", err);
                    translated = await translateWithGoogle(textArray, targetLang, key);
                }

                let tIdx = 0;
                meta.forEach(m => {
                    if(m.type === 'sub') finalBlocks.push(`${m.header}\n${m.time}\n${translated[tIdx++] || ""}`);
                    else if(m.type === 'ass_dialogue') finalBlocks.push(`${m.prefix},${translated[tIdx++] || ""}`);
                    else if(m.type === 'empty') finalBlocks.push("");
                    else finalBlocks.push(m.content);
                });
                
                let pct = Math.min(Math.floor(((i + batch.length) / lines.length) * 100), 100);
                progressBarFill.style.width = pct + '%';
                percentageText.textContent = pct + '%';
                statusText.textContent = `🎬 กำลังประมวลผลด้วย Safe Bullet Masking: บรรทัดที่ ${i + batch.length} / ${lines.length}...`;
            }
            
            let finalContent = (fileExtension === 'srt' || fileExtension === 'vtt') ? finalBlocks.join('\n\n') : finalBlocks.join('\n');
            const blob = new Blob([finalContent], { type: "text/plain;charset=utf-8" });
            saveAs(blob, selectedFile.name.replace(/\.[^/.]+$/, "") + "." + targetLang + "." + fileExtension);
            
            statusText.textContent = "🎉 คืนชีพโครงสร้างใหญ่เสร็จสิ้น ประมวลผลซับเสร็จสมบูรณ์แล้วครับพี่!";
            percentageText.textContent = "100%";
            btnTranslate.removeAttribute('disabled');
            btnTranslate.classList.add('active');
        });
    </script>
</body>
</html>
