  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const video = document.getElementById('video-player');
      const videoPlaceholder = document.getElementById('video-placeholder');
      const player = new Plyr(video, { captions: { active: true, update: true, language: 'en' } });
      let currentType = 'mp4';

      const mp4Button = document.getElementById('mp4-button');
      const dashButton = document.getElementById('dash-button');
      const hlsButton = document.getElementById('hls-button');

      function setActiveButton(button) {
        [mp4Button, dashButton, hlsButton].forEach(btn => btn.classList.remove('btn-active'));
        button.classList.add('btn-active');
      }

      mp4Button.addEventListener('click', () => {
        currentType = 'mp4';
        setActiveButton(mp4Button);
      });
      dashButton.addEventListener('click', () => {
        window.location.href = 'dash-player.html';
      });

      hlsButton.addEventListener('click', () => {
        window.location.href = 'hls-player.html';
      });

      // Set MP4 as default active button
      setActiveButton(mp4Button);

      document.getElementById('play-button').addEventListener('click', () => {
        const videoUrl = document.getElementById('video-url').value;

        if (videoUrl) {
          video.style.display = 'block';
          videoPlaceholder.style.display = 'none';

          player.source = {
            type: 'video',
            sources: [
              {
                src: videoUrl,
                type: 'video/mp4'
              }
            ]
          };
          player.play();
        }
      });

      window.player = player;

              
                  const embedButton = document.getElementById('embed-button');
        const embedModalElement = document.getElementById('embed-modal');
        const embedModal = new bootstrap.Modal(embedModalElement);

        embedButton.addEventListener('click', () => {
          embedModal.show();
        });
              
            });
  </script>
